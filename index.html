<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>營造業丙種職業安全衛生業務主管題庫</title>
<style>
/* ── Reset & Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC",
    "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background .25s, color .25s;
}

/* ── Color tokens ─────────────────────────────────── */
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --border: #dde1e7;
  --text: #1a1a2e;
  --text2: #5a6272;
  --primary: #1e6fbf;
  --primary-dark: #155299;
  --correct: #0f7a42;
  --correct-bg: #d4edda;
  --wrong: #c0392b;
  --wrong-bg: #fde8e6;
  --wrong-border: #e74c3c;
  --tag-bg: #e8f0fb;
  --tag-color: #1e6fbf;
  --progress-track: #e0e5ec;
  --progress-fill: #1e6fbf;
  --progress-done: #0f7a42;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --radius: 12px;
}
[data-theme="dark"] {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3347;
  --text: #e8eaf0;
  --text2: #8a91a8;
  --primary: #4d9de0;
  --primary-dark: #3b85c8;
  --correct: #2ecc71;
  --correct-bg: #0d3320;
  --wrong: #e74c3c;
  --wrong-bg: #3d1212;
  --wrong-border: #e74c3c;
  --tag-bg: #1a2d45;
  --tag-color: #4d9de0;
  --progress-track: #22263a;
  --progress-fill: #4d9de0;
  --progress-done: #2ecc71;
  --shadow: 0 2px 8px rgba(0,0,0,.35);
}

/* ── Header ───────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--primary);
  color: #fff;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
}
header h1 {
  font-size: 1rem; font-weight: 700; flex: 1;
  line-height: 1.3;
}
#theme-btn {
  background: rgba(255,255,255,.2); border: none;
  border-radius: 8px; padding: 6px 10px;
  cursor: pointer; color: #fff; font-size: 1.1rem;
  transition: background .2s;
}
#theme-btn:hover { background: rgba(255,255,255,.35); }

/* ── Progress bar ─────────────────────────────────── */
.progress-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px 10px;
}
.progress-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 5px;
}
.progress-label {
  font-size: .82rem; font-weight: 600; color: var(--text2);
}
.progress-pct {
  font-size: .82rem; font-weight: 700; color: var(--primary);
  transition: color .4s;
}
.progress-pct.done { color: var(--correct); }
.progress-track {
  height: 8px; border-radius: 99px;
  background: var(--progress-track);
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 99px;
  background: var(--progress-fill);
  width: 0%;
  transition: width .4s ease, background .4s;
}
.progress-fill.done { background: var(--progress-done); }

/* ── Controls ─────────────────────────────────────── */
.controls {
  position: sticky; top: 57px; z-index: 90;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.controls select, .controls input {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: .95rem;
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.controls select:focus, .controls input:focus { border-color: var(--primary); }
#law-select { flex: 0 0 auto; max-width: 100%; }
#search-input { flex: 1; min-width: 160px; }
#stats {
  font-size: .82rem; color: var(--text2);
  white-space: nowrap;
}
#clear-wrong-btn {
  font-size: .8rem; padding: 6px 10px;
  background: var(--wrong-bg); color: var(--wrong);
  border: 1px solid var(--wrong-border); border-radius: 8px;
  cursor: pointer; display: none;
}
#clear-wrong-btn:hover { opacity: .85; }
#reset-progress-btn {
  font-size: .8rem; padding: 6px 10px;
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer;
}
#reset-progress-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Main grid ────────────────────────────────────── */
main {
  max-width: 1300px; margin: 0 auto;
  padding: 16px 16px 60px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}
@media (min-width: 1024px) {
  main { grid-template-columns: 1fr 1fr; }
}

/* ── Question card ────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  border-left: 4px solid var(--border);
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color .2s, box-shadow .2s;
  position: relative;
}
.card.was-wrong { border-left-color: var(--wrong-border); }
.card.answered-ok { border-left-color: var(--correct); }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }

.card-header {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
}
.q-num {
  font-weight: 700; color: var(--primary); font-size: .9rem;
  white-space: nowrap; margin-top: 2px;
}
.law-tag {
  font-size: .72rem; font-weight: 600;
  background: var(--tag-bg); color: var(--tag-color);
  padding: 2px 7px; border-radius: 20px;
  white-space: nowrap; line-height: 1.6;
  max-width: 140px; overflow: hidden; text-overflow: ellipsis;
}
.law-tag.numeric { background: #fff3e0; color: #e65100; }

.q-text {
  font-size: 1rem; font-weight: 500; color: var(--text);
  line-height: 1.55;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 7px; }
.opt-btn {
  width: 100%; text-align: left;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: .93rem; cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
  line-height: 1.5;
  min-height: 44px;
}
.opt-btn:hover:not(:disabled) {
  background: var(--tag-bg); border-color: var(--primary);
  transform: translateX(2px);
}
.opt-btn:disabled { cursor: default; }
.opt-btn.correct {
  background: var(--correct-bg); border-color: var(--correct); color: var(--correct);
  font-weight: 600;
}
.opt-btn.wrong {
  background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong);
}

/* Result row */
.result-row {
  display: none; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  font-size: .9rem; font-weight: 600;
}
.result-row.show { display: flex; }
.result-row.ok { background: var(--correct-bg); color: var(--correct); }
.result-row.bad { background: var(--wrong-bg); color: var(--wrong); }
.retry-btn {
  margin-left: auto; padding: 4px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; font-size: .82rem; color: var(--text2);
}
.retry-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Empty state ──────────────────────────────────── */
#empty {
  display: none;
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px;
  color: var(--text2); font-size: 1.1rem;
}

/* ── Scrollbar ─────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Mobile tweaks ────────────────────────────────── */
@media (max-width: 600px) {
  header h1 { font-size: .9rem; }
  .q-text { font-size: .97rem; }
  .opt-btn { font-size: .91rem; padding: 11px 12px; min-height: 52px; }
  .controls { top: 53px; flex-wrap: wrap; }
  #law-select { width: 100%; }
  #search-input { flex: 1 1 140px; }
  .progress-section { padding: 6px 12px 8px; }
}
</style>
</head>

:"營造安全衛生設施標準規定勞工從事露天開挖作業，垂直開挖深度應妥為設計，如其深度多少應設擋土支撐，下列何者正確？","options":["1.8 公尺以上","2.1 公尺以上","2 公尺以上","1.5 公尺以上"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":true},{"id":26,"text":"露天開挖作業防止崩塌災害，以下作業方式何者為非？","options":["開挖垂直深度超過 1.5 公尺應設置擋土支撐","露天開挖作業主管應到場指揮監督","應注意接臨道路震動與排水","趕工需要，無需設置擋土支撐"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":true},{"id":27,"text":"營造工程中之「物體倒榻」是屬於下列何者？","options":["特有災害","交通事故","一般災害","自然災害"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":28,"text":"建築工程進行混凝土澆置作業時，應辦理事項，下列敘述何者錯誤？","options":["為提高品質，無論模板支撐設計載重為何，應採用自充填混凝土","應檢查模板支撐各部分之連接及斜撐","禁止無關人員進入模板下方","混凝土澆置作業應指定安全出入路口"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":29,"text":"露天開挖作業中常見災害為倒塌崩塌、墜落、感電及物體飛落，其相關防災作法，以下何者為非？","options":["挖土機迴轉半徑內，可允許工作人員自由進出","依地質鑽探調查結果擬定開挖計畫","開挖車輛機械應裝設倒車或旋轉警示燈及蜂鳴器","開挖深度大於 1.5m 以上，有崩塌之虞，應設擋土支撐"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":30,"text":"某山岳隧道正進行通路之配置，下列敘述何者錯誤？","options":["如以車輛運輸人員，得不設置作業人員專用通路","作業人員專用通路，於車輛行駛路徑應以欄杆隔離","應規劃作業人員專用通路","作業人員專用通路應鋪設踏板外，其餘部分亦同，以維安全"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":31,"text":"使用道路作業、鄰近道路作業或有導致交通事故之虞之工作場所作業安全應注意事項，以下何者非？","options":["設置交通引導人員","依規定設置適當交通號誌、標示或柵欄","應注意屋頂作業安全","夜間柵欄應設有照明或反光片等設施 112.05.16 版"],"answer":3,"law":"職業安全衛生設施規則","isNumeric":false},{"id":32,"text":"下列何者屬於地盤改良工法？","options":["鑽掘樁工法","全套管樁工法","置換工法","反循環樁工法"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":33,"text":"工作安全分析應注意事項，不包括下列何者？","options":["圍籬綠化程度","人及方法方面","材料及環境方面","機械方面"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":34,"text":"下列何者不屬於山岳隧道開挖及支撐工程安全管理重點？","options":["打樁作業安全管理","隧道開挖面安全檢查","隧道支撐系統安全管理","隧道爆破安全管理"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":35,"text":"下列有關工程監造單位應辦理事項之敘述，何者錯誤？","options":["於施工中、驗收或使用前，分別實施必要之查核，以確認其符合性:相關執行紀錄自查核日起保存一年","配合施工程序設定安全衛生查核點，據以執行","設置監督查核之管理組織、配置適當數量符合資格之查核人員","訂定工程監督查核計畫以於施工過程實施監督查核"],"answer":1,"law":"職業安全衛生法","isNumeric":true},{"id":36,"text":"甲公司辦理社區排水改善工程，為工區警衛及交通引導工作需要，擬以勞務承攬方式進用 8 名勞工，採購文件中應載明投標廠商辦理事項為何，方為完整正確？","options":["採購契約範本、施工綱要規範、安全衛生工作守則","職業安全衛生法規、施工安全衛生規範、業主契約文件","工作內容、工作場所特性、安全設施及個人防護具設置需求、進場勞工管理事項等","標單、契約書、僱用證明、勞保名冊"],"answer":3,"law":"職業安全衛生設施規則","isNumeric":true},{"id":37,"text":"下列有關營造廠商辦理施工安全設施採購之敘述，何者錯誤？","options":["應由各分項工程承攬商採購設置以明全責","配合施工進度需要，分批採購符合法規規格之設施","事先估算所需各類設施數量，依規定開具詳細規格，訂定開口契約，配合工程進度進場安裝","依據施工方法、程序，選用安全設施之類型、數量，分批採購"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":38,"text":"下列有關營造工地進場管制之敘述，何者正確？","options":["各承攬商應事先提報預定進場人員之名單，詳列姓名、年齡、住址、電話、投保資料、教育訓練資格等，以便進場時逐一核對確認","吊掛荷重在三公噸以上之起重機須進場時檢附合格證，其餘機具經外觀檢視完整者即可進場","承攬商先行提報聘僱工程師名單，經確認符合資格，該等人員進場時不須再予檢視","承攬商預先提報採用符合 CNS4750 規格之施工架，材料進場時可不需再予檢視"],"answer":1,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":39,"text":"下列有關施工機具採購之敘述，何者錯誤？","options":["隧道開挖機等特殊機具，應於採購規範中訂明應辦理試運轉及必要之功能驗證測試，以為驗收之依據","採購契約應自行考量機具組裝、測試之安全防護設施、應使用安全防護具等","得標廠商應自行考量機具設備送抵工地之方式，採購規範中無需特別予以規定","採購契約中應規定供應商提供機具組裝、測試所需之機具設備及專業人力"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":40,"text":"甲公司將所承攬之大樓新建工程中基礎工程分包由乙公司承攬，下列敘述何者正確？","options":["乙公司應負責該大樓新建工程作業勞工進場管制","乙公司僱用勞工之職業安全衛生教育訓練應由甲公司統一辦理，與乙公司無關","乙公司應訂定結構分項工程作業計畫送甲公司核定施工","甲公司應建立承攬管理制度，於施工過程實施承攬管理"],"answer":4,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":41,"text":"甲事業單位將施工架組立工程交付乙承攬商施工，下列敘述，何者正確？","options":["施工架材料由甲提供，乙所指派之施工架組配作業主管無需再檢查","施工架組立工作過程，甲應派員監督查核，乙無需再指派施工架組配作業主管確認安全衛生設施之狀況","甲已於施工規劃階段實施風險評估，乙無需再進行作業前危害調查、評估","乙應於使勞工進場作業前，指派法定專業人員實施危害調查、評估 112.05.16 版"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":42,"text":"下列有關危險性工作場所施工安全評估成果運用之敘述，何者正確？","options":["依據評估成果修正，補充施工計畫書內容，送經勞動檢查機構審查通過後，通知工地進行危險場所部分工程","施工安全評估報告書，送請監造單位核轉主辦機關審查後施工","施工安全評估報告書，提送監造單位審查轉送勞動檢查機構備查，據以施工","評估報告分別送請專任工程人員、作業主管、工地主任等審查簽署，送請勞動檢查機構審查，同時通知協力廠商進場施工"],"answer":1,"law":"勞動檢查法","isNumeric":false},{"id":43,"text":"下列有關營造業能力鑑別之敘述，何者錯誤？","options":["應建立勞工進場管制機制，以確認職業安全衛生教育訓練成效","應針對承攬工程之需要，確認各級承攬商具備足夠之職業安全衛生管理能力","應建立勞工資格鑑別、教育訓練、承攬商評鑑等程序，以確保勞工、承攬商資格能力","應制定各類人員職務說明書，明確訂定各層級人員應辦理事項及所需具備之資格能力"],"answer":1,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":44,"text":"下列有關風險管理之敘述，何者錯誤？","options":["主辦機關辦理工程採購應合理設定工程功能需求及工期","機具設備設計製造以產能為導向，操作安全應由使用者依各自之工作內容進行風險評估，與製造者無關","施工規劃階段應實施風險評估","辦理工程設計採購，應要求設計階段實施風險評估"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":45,"text":"甲公司將所承攬之大樓新建工程中帷幕吊裝工程交由乙公司承攬，下列有關風險評估之敘述，何者正確？","options":["帷幕牆吊裝作業計畫由甲公司擬定，交由乙公司進行風險評估後，交還甲公司執行","乙公司研擬帷幕吊裝工程作業計畫，提送甲公司召集乙公司及相關人員進行風險評估，依評估結果研擬對策後，交還乙公司修正補充再提報甲公司核可後，依通知進場作業","乙公司訂定帷幕牆吊裝作業計畫後提送甲公司併同整體工程實施風險評估，乙公司無需參與","乙公司研擬帷幕吊裝分項作業計畫並實施風險評估後提送甲公司備查，依通知進場施工並負責管理該項工作施工安全"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":46,"text":"下列有關風險評估成果追蹤管制措施之敘述，何者錯誤？","options":["列入工地協議組織會議中列管追蹤","公司管理審查會議檢討實施成效","列入自主檢查缺失統計","應由相關部門主管追蹤對策處置人員辦理情形"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":47,"text":"下列有關營造業職業安全衛生管理系統組織設計之敘述，何者錯誤？","options":["應建立安全衛生管理組織架構並製作組織編制體系圖表","安全衛生管理組織架構及各級管理人員之權責如有修訂、職務調整等，以書面通知當事人及所屬單位即可","安全衛生管理組織架構及各級管理人員之權責，應以書面通知勞工及各承攬商與相關人員","營造業者應設置相關組織，指派權責人員，分別辦理各相關工作"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":48,"text":"下列何者為營造業辦理職業安全衛生管理計畫訂定內容之依據？","options":["職業安全衛生法施行細則第31條","勞動檢查法第26條","危險性工作場所審查及檢查辦法","職業安全衛生管理辦法"],"answer":1,"law":"職業安全衛生法施行細則","isNumeric":false},{"id":49,"text":"營造業職業安全衛生管理系統稽核之目的為何？","options":["法定自動檢查工作項目","查核是否依規定實施職業災害調查","稽查職業安全衛生管理計畫是否符合規定","評估系統運作之適切性"],"answer":4,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":50,"text":"下列有關營造風險特性敘述，何者錯誤？","options":["營造工程內容常有高層建築、高架橋梁、地下深開挖、長隧道等艱困之任務，潛存之本質危害極高","營造業多採分包經營，承攬商管理及協調具相當不確定之風險","營造工地多位於山區、水邊或不平整地形等惡劣之環境，多數作業需於戶外露天進行，作業場所之危害度極高","現代營建機具多採自動化設計，操作安全性高，使用者依操作手冊作業即可確保安全 112.05.16 版"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":51,"text":"依職業安全衛生管理辦法規定，下列何者非屬承攬管理計畫相關執行紀錄應登載之內容？","options":["危險作業管制","職業安全衛生政策","緊急應變及安全衛生績效評估","職業災害通報"],"answer":2,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":52,"text":"下列有關職業安全衛生政策之敘述，何者符合 CNS15506 之規定？","options":["應由職業安全衛生業務主管研擬，經管理審查會議核定","應由事業單位最高管理階層核定","事業單位應依據職業安全衛生主管機關頒行之年度檢查目標訂定職業安全衛生政策","事業單位訂定後應提報檢查機關核定"],"answer":2,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":53,"text":"下列何者為職業安全衛生管理系統指導綱要之訂定目的？","options":["檢查機構審查事業單位提報職業安全衛生管理計畫之依據","主管機關提升職業安全衛生管理績效之政策綱領","公共工程主辦機關推動加強公共工程安全衛生之實施依據","說明職業安全衛生系統建置需求，以為事業單位建立及推動 TOSHMS 之參考"],"answer":4,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":54,"text":"雇主對於新僱營造作業勞工，應使其接受幾小時之安全衛生教育訓練？","options":["4","6","3","5"],"answer":2,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":55,"text":"墜落災害為營造最常見之災害類型，學理上所採取之控制方式包括:a.警告(WARN) b.消除(ELIMLNATE) c.阻止(ARREST) d.預防(PREVENT)，其優先順序為何？","options":["dcba","cdab","abcd","bdca"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":true},{"id":56,"text":"下列何者非職業災害發生的間接原因？","options":["未提供安全設備","未提供安全護具","安全衛生管理不當","未依標準作業程序操作"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":57,"text":"職業災害發生之原因可分為直接原因、間接原因及基本原因，下列何者係屬直接原因？","options":["能量","不安全行為","管理上的缺陷","不安全狀況"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":58,"text":"我國最高勞工行政主管機關為下列何者？","options":["經濟部","勞動部","勞工保險局","內政部"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":59,"text":"為防止機械夾捲、切割傷害，下列何者為不安全之行為？","options":["將長髮繫綁","穿寬鬆衣服","穿戴適當防護具","不穿戴圍巾"],"answer":2,"law":"職業安全衛生設施規則","isNumeric":false},{"id":60,"text":"依營造安全衛生設施標準規定，雇主構築施工架時，有鄰近結構物周遭或跨越工作走道者，應於其下方設置何種防護設施，以防止物體飛落引起災害？","options":["下拉桿","先行扶手框","斜籬及防護網","護籠"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":61,"text":"依營造安全衛生設施標準規定，系統式施工架之金屬材料、管徑、厚度、表面處理、輪盤或八腳盤等構建之雙面全周焊接、製造方法及標示等，應符合下列何項國家標準？","options":["CNS 7535 高處作業用安全帶檢驗法","CNS 4750 鋼管施工架","CNS 4751 鋼管施工架檢驗法","CNS 4734 高處作業用安全帶"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":62,"text":"依營造安全衛生設施標準規定，雇主對於不能藉梯子、高空工作車或其他方法安全完成之2 公尺以上高處營造作業，應設置何項設施？","options":["施工架","扶手","棧橋","施工構台"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":true},{"id":63,"text":"依營造安全衛生設施標準規定，鋼構組配作業之熔接、栓接、鉚接及鋼構之豎立等作業，於敲出栓桿、衝梢或鉚釘頭時，應防止其發生何項危害？","options":["感電","敲毀","任意飛落","被夾"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":64,"text":"依營造安全衛生設施標準規定，雇主對於作業人員進入下列何種場所時，應提供適當安全帽，並使其正確戴用？","options":["員工休息室","辦公室","營繕工程工作場所","工地事務所"],"answer":3,"law":"職業安全衛生設施規則","isNumeric":false},{"id":65,"text":"依營造安全衛生設施標準規定，對於沉箱、沉筒、井筒等內部從事開挖作業時，為防止急速沉陷危害勞工之措施與下列何項敘述無關？","options":["刃口下端不得下挖 50 公分以上","依下沉關係圖，決定開挖方法及載重量","刃口至頂版或梁底之淨距應在 1.8 公尺以上","禁止攜帶打火機或火柴 112.05.16 版"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":true},{"id":66,"text":"依營造安全衛生設施標準規定，有關下列護蓋之敘述，何者正確？a.應具有能使用人員及車輛安全通過之強度。b.應以有效方法防止滑溜、掉落、掀出或移動。c.供車輛通行者，得以車輛後軸載重之2倍設計之，並不得妨礙車輛之正常通行。d.為柵狀構造者，柵條間隔不得大於 3 公分。e.上面不得放置機動設備或超過其設計強度之重物。f.臨時性開口處使用之護蓋，表面漆以綠色，並書以警告訊息。","options":["a.b.c.d.f","b.c.d.e.f","a.b.d.e.f","a.b.c.d.e"],"answer":4,"law":"職業安全衛生法","isNumeric":true},{"id":67,"text":"依營造安全衛生設施標準規定，除必須進出口外，護欄應圍繞於何處？","options":["樓地板","工作場所","所有危險之開口部分","營造工地"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":68,"text":"下列何者不屬於職業安全衛生教育訓練規則之營造作業主管？","options":["高壓室內作業主管","屋頂作業主管","施工架組配作業主管","隧道等挖掘作業主管"],"answer":1,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":69,"text":"下列何者不屬於職業安全衛生法規？","options":["道路交通安全規則","起重升降機具安全規則","職業安全衛生設施規則","營造安全衛生設施標準"],"answer":1,"law":"職業安全衛生設施規則","isNumeric":false},{"id":70,"text":"依職業安全衛生設施規則規定，對於雇主為金屬之熔接、熔斷或加熱等作業所需使用可燃性氣體及氧氣之容器，下列敘述何者錯誤？","options":["容器不得設置於通風或換氣不充分之場所","容器應橫放，便於地面滾動","容器使用時，應留置專用板手於容器閥柄上","保持容器之溫度於攝氏 40 度以下"],"answer":2,"law":"職業安全衛生設施規則","isNumeric":true},{"id":71,"text":"依職業安全衛生設施規則規定，雇主對於從事灌注、卸收或儲藏危險物於槽車等作業，下列敘述何者錯誤？","options":["使用槽車從事灌注作業前，槽車之引擎不應熄火","作業結束後，確認不致因引擎啟動而發生危害後，始得發動","使用槽車從事灌注作業前，應設置適當之輪檔","使用軟管從事可燃性氣體之灌注時，應事先確定軟管結合部分已確實連接牢固"],"answer":1,"law":"職業安全衛生設施規則","isNumeric":false},{"id":72,"text":"依職業安全衛生設施規則規定，下列何者非屬可燃性氣體？","options":["氫","乙炔","乙醚","丙烷"],"answer":3,"law":"職業安全衛生設施規則","isNumeric":false},{"id":73,"text":"依勞工健康保護規則之規定，下列何者不是特別危害健康之作業？","options":["噪音作業","粉塵作業","高溫作業","高架作業"],"answer":4,"law":"勞工健康保護規則","isNumeric":false},{"id":74,"text":"依職業安全衛生設施規則規定，雇主對於勞工從事載貨台卸貨物其高差至少在幾公尺以上者，應提供勞工安全上下之設備？","options":["2.5","2","1.5","3"],"answer":3,"law":"職業安全衛生設施規則","isNumeric":false},{"id":75,"text":"依起重升降機具安全規則規定，起重機之使用，不得超過下列何項限制？","options":["平均荷重","額定荷重","積載荷重","標準荷重"],"answer":2,"law":"起重升降機具安全規則","isNumeric":false},{"id":76,"text":"下列何者構成組織溝通協調之阻力？","options":["高階主管的支持與認同","相似的資源、目標及需要","利益大於成本","專業訓練互異，缺乏共同語言"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":77,"text":"有關公司員工健康檢查結果之處理，下列敘述何者錯誤？","options":["健康檢查結果應彙整成健康檢查手冊","健康檢查結果之處理應考量勞工隱私權","兩家公司共同承攬之工程，員工健康檢查結果保存期限至該工程完工為止","健康檢查結果應發給受檢勞工"],"answer":3,"law":"勞工健康保護規則","isNumeric":false},{"id":78,"text":"部屬對上司的溝通屬於下列何種情況？","options":["角色地位不同","用小人之心，度君子之腹","利益衝突","主觀猜測"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":79,"text":"起重機吊搬作業下列採取措施何者不正確？","options":["吊掛物使用吊耳時，吊耳位置及數量應達確實平衡","吊掛用具應有足夠強度","運轉時採取防止吊掛物通過人員上方措施","吊鉤防滑舌片彈性鬆弛"],"answer":4,"law":"起重升降機具安全規則","isNumeric":false},{"id":80,"text":"口語、文字、態度、觀念或習慣等認知差異均造成影響溝通的因素，下列何者屬口語因素？","options":["話不投機半句多","道不同，不相為謀","臭氣相投","井水不犯河水 112.05.16 版"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":81,"text":"交流電焊機未設置自動電擊防止裝置，致勞工於作業時不慎碰觸感電，其災害之間接原因下列何者？","options":["不安全制度","不安全動作","不安全設備","天災"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":82,"text":"甲公司承攬某捷運工程依規定應向勞動檢查機構報備職業災害統計資料之頻率為何？","options":["每月","每年","每三個月","每2個月"],"answer":1,"law":"勞動檢查法","isNumeric":true},{"id":83,"text":"下列有關職業災害調查必要對象之敘述，何者有誤？","options":["勞動檢查員","作業主管","安全衛生人員","工作場所負責人"],"answer":1,"law":"勞動檢查法","isNumeric":false},{"id":84,"text":"下列何者非為造成骨骼肌肉傷害原因？","options":["性別","工作頻率","工作及休息安排","工作姿勢"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":85,"text":"以下何者非為山岳隧道作業勞工可能出現之職業病？","options":["潛水伕症","職業性皮膚病","聽力損失","塵肺症"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":86,"text":"依職業安全衛生法規定，勞工受僱前應接受何種檢查以便分配適當的工作？","options":["靈敏度檢查","適性檢查","心理檢查","體格檢查"],"answer":4,"law":"勞工健康保護規則","isNumeric":false},{"id":87,"text":"由木材、紙張、煤炭、橡膠及垃圾等一般可燃性固體物質所引起之火災係屬下列何類？","options":["丁(D)類火災","乙(B)類火災","甲(A)類火災","丙(C)類火災"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":88,"text":"下列何者不屬於隧道爆破作業時，可能發生之危害？","options":["異常氣壓","崩塌","缺氧及有害氣體中毒","物體飛落"],"answer":1,"law":"缺氧症預防規則","isNumeric":false},{"id":89,"text":"設置適當滑槽供高處投下物體，屬防止何種危害之設施？","options":["物體倒塌","物體飛落","墜落","人員被撞"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":90,"text":"鋼構建築使用移動式起重機吊裝鋼構時，下列敘述何者錯誤？","options":["鋼構長度超過6公尺時，應於一端以拉索捆紮拉緊，保持平穩防止擺動","起重機作業時應指派專人負責指揮","施工範圍應管制非作業人員不得進入","安放鋼構時，應由側方及交叉方向安全支撐"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":true},{"id":91,"text":"山岳隧道洞口坡面保護工作之施作，下列敘述何者錯誤？","options":["應自坡頂裝設垂直母索","於斜坡面作業之人員，應佩戴安全帶","洞口上方設置護欄，可防止坡面石塊飛落","隧道作業，皆應正確穿戴安全帽、反光背心"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":92,"text":"都會區捷運潛盾隧道工程，常需設置3300伏特高壓變電站，下列敘述何者正確？","options":["該工地有專任電氣技術人員即可","該工地設置初、中、高級電氣技術人員皆可","該工地應設置初級電氣技術人員","該工地應設置中級電氣技術人員"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":93,"text":"罹災者因感電而墜落時，應歸類為下列何種災害？","options":["感電","墜落","與有害物等之接觸","視死亡原因而定"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":94,"text":"具有吊鉤、抓斗等吊具或該吊具之捲揚用槽輪之上方與捲眮、槽輪、吊運車、椼架或其他有碰撞之虞物體(傾斜之伸臂除外)下方間之間隔，應保持在幾公分以上之構造？","options":["5","25","10","15"],"answer":2,"law":"起重升降機具安全規則","isNumeric":false},{"id":95,"text":"以下何種機械適用於營建工程吊掛作業？","options":["未有吊鈎之動力鏟類機械","堆高機","合格之移動式起重機","未有吊鈎之挖土機鏟斗"],"answer":3,"law":"起重升降機具安全規則","isNumeric":false},{"id":96,"text":"推管工程工作井，採用挖土機進行開挖作業時，下列敘述何者正確？","options":["工作井護欄，可以任意拆除，以免影響開挖作業","因工作井深度有限，故可暫時不須設置上下設備","挖土機行駛時，應將挖掘臂放於行進之前方","挖土機停機時，應將挖掘臂放低，抬高挖斗 112.05.16 版"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":97,"text":"某建築工地因暴雨路面積水，導致已完成結構之地下室淹水，路面積水消退後，將進行抽排水作業，下列敘述何者錯誤？","options":["抽排水作業前，應先確認淹水區內所有電源均已斷電","抽水機電源之接續作業，應由專業電氣技術人員辦理","地下室內不宜使用汽油抽水機","抽水機電源可以接於無熔絲開關之電源側"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":98,"text":"起重機及人字臂起重桿之吊掛用具的吊鏈使用安全之規定，下列敘述何者正確？","options":["直徑減少達公稱直徑百分之七以上者不可使用","斷面直徑減少超過製造時之百分之十者不可使用","有腐蝕仍可使用","有龜裂仍可使用"],"answer":2,"law":"起重升降機具安全規則","isNumeric":true},{"id":99,"text":"某建築工程結構體已完成，於電梯間設置捲揚機，進行裝修物料之吊運作業，下列敘述何者錯誤？","options":["電梯間設置捲揚機，進行物料之吊運作業無需管制","吊料作業人員應先鈎掛安全帶，再打開電梯口護欄","吊料作業範圍應有充分照明","暫停吊運物料時，應即關閉電梯口護欄並上鎖"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":100,"text":"下列何者屬於作業人員發生位能高差變化之災害？","options":["倒塌","物體飛落","感電","墜落"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":101,"text":"下列何者非屬墜落災害防止設施?","options":["開口邊緣設置護欄","開口邊緣張掛安全網","施工架設置壁連座","施工架於地面預組"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":102,"text":"對營造工程之施工架、施工構台及模板支撐應實施檢查，下列何者為非？","options":["五級以上地震襲擊後","每次停工之復工前","強風大雨惡劣氣候襲擊後","每週一次"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":true},{"id":103,"text":"某建築工程需施作水電配管作業，正進行管料進場儲存，下列敘述何者錯誤？","options":["管料應依規格大小分別排列","管料應分層疊放，每層中置一隔板，以防止管料滑出","管料應依同一規格，互相層層相疊","管料應依不同長度分別排列"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":104,"text":"施工架組配、模板支撐等作業主管之資格如何？","options":["由安全衛生人員兼任即可","高中畢業即可","需具備施工架組配、模板支撐等營造作業主管安全衛生教育訓練合格","由老闆任意指定即可"],"answer":3,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":105,"text":"下列何者無法防止山岳隧道開挖面發生崩塌？","options":["開挖面鋪設防水膜","開挖面打設排水孔","開挖面以噴凝土封面","開挖面打設先撐鋼管"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":106,"text":"下列有關沉箱施工之敘述，何者正確？","options":["拖放預購沈箱時，水面、水下作業人員應分別採各自獨立之通訊系統，以防干擾","於沉箱內部從事開挖作業時，應開挖至刃口下方至少 60 公分，以維持人員作業空間","於沉箱、沈筒、井筒等之設備內部，從事開挖作業時，應測定空氣中氧氣及有害氣體之濃度，並應有使勞工安全昇降之設備等","雇主使勞工於壓氣沉箱施工時，應指派擋土支撐作業主管就可燃物品於高氣壓狀況下燃燒之危險性，告知勞工"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":true},{"id":107,"text":"鄰水作業中為使勞工安全作業，預防溺斃災害之發生，以下何種防災作為並不適當？","options":["勞工著用救生衣","勞工有落水者之虞者，應設置防止勞工落水之設施","防汛期間應派遣勞工不顧危險於行水區域固守機具","工作場所或其附近設置救生設備"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":108,"text":"異常氣壓作業之檢點，不包括下列何者？","options":["高壓室內作業","動火作業場所","沈箱作業","潛水作業"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":109,"text":"下列何者非屬「職業安全衛生管理系統」中有關承攬管理績效評估之內容？","options":["施工進度管理","安全衛生設施之設置及維護狀況","參與安全衛生協議會議狀況及決議事項辦理情形","分項工程計畫之訂定及執行情形 112.05.16 版"],"answer":1,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":110,"text":"橋梁基礎採基樁時，有關基樁鋼筋加工、儲存、運送等作業，為防止鋼筋滾動滑落，下列敘述何者錯誤？","options":["鋼筋加工場地應經整平夯實，確認地面承載力","鋼筋載運時，可採多層堆置","鋼筋堆放時應設置適當之墊襯及擋樁","鋼筋以吊卡車運送時，應以纜索加以適當捆紮"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":111,"text":"建築物外牆採預鑄牆版吊裝工法，下列敘述何者錯誤？","options":["作業安全性較現地舖裝高","可縮短現場作業時間","作業品質較現地舖裝良好","吊裝作業較石材貼砌危險性高"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":112,"text":"下列何者是營造工程特性？","options":["大多採分包，多家廠商共同作業","大多數屬室內作業","勞工流動性不高","不受天候地形影響"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":113,"text":"營造工程職業安全衛生設施之採購，應如何辦理？","options":["發包交由專業廠商安裝，無涉使用該等設施之承包商管理責任","配合工程進展於作業前設置完妥，施工過程隨時檢視維護，以維持正常功能","於分項工程採購契約中明定各分包承攬商應自行負責工作所需之安全衛生設施，無須原事業單位費心管理","原事業單位購置材料交由臨時點工安裝"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":114,"text":"下列有關營造廠商辦理施工安全設施採購之敘述，何者錯誤？","options":["依據施工法、程序，選用安全設施之類型、數量，分批採購","配合施工進度需要，分批採購符合法規規格之設施","事先估算所需各類設施數量，依規定開具詳細規格，訂定開口契約，配合工程進度進場安裝","應由各分項工程承攬商採購設置以明權責"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":115,"text":"下列有關施工機具評估之敘述，何者錯誤？","options":["施工機械設備之作業方式必須符合法令規定安全需求","機械設備尺寸無關乎操作性能，無需特別予以規範","評估施工機械所完成之工作品質必須符合規範需求","依據施工機械設備之規格、性能評估其功率是否能滿足工程預定進度所需"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":116,"text":"下列有關工程採購管理實施範圍之敘述，何者錯誤？","options":["工程採購實施前，應確實審核該標案之各項圖說、標單等招標文件是否詳實","編列採購預算應確實將各工作項目之作業內容、方法、數量等核算明確，編列合理費用","因應工程需要得定投標廠商資格要件，將廠商之相關工程經歷、履約紀錄等納入規定","工程採購管理應自招標受理廠商投標文件之審核開始"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":117,"text":"下列有關進場管制之敘述，何者錯誤？","options":["起重機等危險機械設備，應確認檢查合格證明之效期","鋼構組配廠商指派之作業主管應憑該公司職員證，進入工區作業","進場人員應逐一檢查是否具備合格證件","施工架等安全設施材料應檢附材質證明文件"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":118,"text":"下列有關承攬管理之敘述，何者錯誤？","options":["原事業單位應督導現場作業各級承攬人實施安全衛生設施之設置，使用及維護","原事業單位應督導各工項分包承攬人就使用之機具設備進行必要之檢點，維修保養等作業，以維正常功能","各工項分包承攬人依據原事業單位核可之分項工程作業計畫施工並自主辦理檢查，原事業單位則就非屬承攬範圍實施檢查","原事業單位應依施工進度需要，分別通知相關承攬人進場作業"],"answer":3,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":119,"text":"甲公司將所承攬之大樓新建工程中基礎工程分包由乙公司承攬，下列敘述何者正確？","options":["乙公司僱用勞工之職業安全衛生教育訓練應由甲公司統一辦理，與乙公司無關","乙公司應負責該大樓新建工程作業勞工進場管制","乙公司應訂定結構分項工程作業計畫送甲公司核定施工","甲公司應建立承攬管理制度，於施工過程實施承攬管理"],"answer":4,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":120,"text":"下列有關工程風險評估之敘述，何者錯誤？","options":["工程主辦機關於工程規劃階段應實施風險評估","丁類危險性場所應實施施工安全評估","工程設計階段應實施風險評估","施工規劃階段應實施風險評估 112.05.16 版"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":121,"text":"依職業安全衛生管理辦法規定下列何者非屬自動檢查之內容？","options":["機械之定期檢查","機械、設備之重點檢查","勞工健康檢查","機械、設備之作業檢點"],"answer":3,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":122,"text":"下列有關建築物增建工程應辦理事項之敘述，何者錯誤？","options":["增建部分高度未超過80公尺、地下開挖未達18公尺、模板支撐高度未達7公尺，無需實施風險評估","設計單位(建築師事務所)應實施工程設計階段風險評估","工程承包商應實施施工規劃風險評估","增建之鋼構組配作業前應指派所雇之職業安全衛生人員等專業人員辦理危害調查、評估"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":true},{"id":123,"text":"下列有關變更風險評估及管理之敘述，何者錯誤？","options":["啟用變更前，應檢查確認評估修正變更計畫之各項因應措施均已完成，可有效控制該等風險","應就變更部分評估其風險","經評估後對不可接受之風險應擬定對策修正變更計畫","因現地情況差異、施工內容及方法之改變、主要機具設備變更、主要安全衛生設施變更等，應即就變更部分變更計畫，送請專任工程人員審核確定後實施變更部分之施工"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":124,"text":"某橋梁工程上部結構施工現況如照片所示，應採行之對策為何？","options":["以繩索綁紮於組立之鋼筋上","確實使用背負式安全帶並勾掛於妥適錨錠處","（配合照片，詳見題冊）","（配合照片，詳見題冊）"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":125,"text":"下列有關營造工程施工風險評估方法選擇之敘述，何者錯誤？","options":["應依據作業特性，選擇適當之評估方法","以能清楚分析作業情境，發掘潛在危害及其發生可能性、評估嚴重度之方法","應依據工程複雜難度選擇之評估方法","應一律採用風險矩陣進行評量"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":126,"text":"下列有關營造工程特有災害評估之敘述，何者正確？","options":["應依作業拆解結果逐項依勞動檢查法第 28 條規定檢核是否具立即危險之虞，以確保安全性","為確保評估之技術可行性，應分別依據工程類型委託各專門職業技師詳予評估並簽證","評估小組就工作內容及作業場所環境狀況模擬推演，以發掘可能之危害狀況，分析災害要因，檢討現有措施，以評估風險，對不可接受之風險擬定對策修正計畫","由施工安全評估人員專責辦理以確保符合法規並經各承攬商簽名確認，再送請工作場所負責人覆核確認"],"answer":3,"law":"勞動檢查法","isNumeric":false},{"id":127,"text":"下列有關營造業職業安全管理系統指引之敘述，何者錯誤？","options":["ISO45001 係國際標準協會制訂以取代 OHSAS18001 之國際標準","營造業應依TOSHMS建置並運作職業安全衛生管理系統，與 ISO31000 之規定無關","已取得 OHSAS18001 認證之事業單位，應於 ISO45001 頒訂後2 年內改版，並換證","營造業依 CNS15506 取得職業安全衛生管理系統認證合格，仍於指定期限內依 ISO45001 規定辦理改版"],"answer":2,"law":"職業安全衛生法","isNumeric":true},{"id":128,"text":"下列有關營造工地自主檢查之實施，何者錯誤？","options":["擋土支撐作業自主檢查應由作業主管負責，與安全衛生管理人員無關","應建立缺失改善追蹤機制，確實督導改正不符合事項","依據自主檢查計畫配合工進實施","定期辦理檢查結果統計分析，以即時修正自主檢查內容"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":129,"text":"下列有關營造業職業安全衛生管理績效評估之敘述，何者正確？","options":["應建立績效監督與量測程序辦理","應由法定之安全衛生人員專責獨立辦理","應由檢查機構之績效認可單位實施","應由管理代表實施 112.05.16 版"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":130,"text":"依營造業職業安全衛生管理系統指引規定，應如何實施營造業職業安全衛生管理績效監督？","options":["於職業安全衛生管理組織及人員之職掌中明訂權責實施","由安全衛生人員提報管理審查","由作業主管實施以確保作業安全","依據工程性質及組織規模，設定主動式監督與被動式監督方式"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":131,"text":"勞動檢查機構辦理下列何種檢查、鑑定、分析等事項，依現行勞動法令規定，得由中央主管機關所屬勞動及職業安全衛生研究所或其他學術、研究機構提供必要之技術協助？","options":["危險性機械或設備檢查","處理勞動條件秘密申訴案件","職業災害檢查","勞動基準法令規定事項之檢查"],"answer":3,"law":"勞動檢查法","isNumeric":false},{"id":132,"text":"營造業勞工在夏季酷熱環境下作業，因未採取適當保護措施時，易罹患之病狀，下列何者為非？","options":["白血病","熱衰竭","熱痙攣","中暑"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":133,"text":"機關於工程規劃、設計時，應要求規劃、設計單位將安全衛生經費明細表等作為招標文件，納入契約執行，下列何者不包括在內？","options":["規劃安全衛生注意事項、圖說","施工安全衛生規範","職業安全衛生法規","逾期罰款"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":134,"text":"下列何者非職業災害發生的間接原因？","options":["未依標準作業程序操作","安全衛生管理不善","未提供安全設備","未提供安全護具"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":135,"text":"勞工不遵守安全衛生工作手則規定，屬於下列何者？","options":["不安全環境","公害","不安全行為","不安全設備"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":136,"text":"依歐姆定律公式，當電阻固定時，電壓愈高，則電流為下列何者？","options":["愈高","相同","愈低","不一定"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":137,"text":"依營造安全衛生設施標準規定，有關以木材為模板支撐之支柱，下列敘述何者錯誤？","options":["木材支柱最小斷面積應大於 31.5 平方公分","支柱底部需固定於有足夠強度之基礎上，且每根支柱之淨高不得超過 5 公尺","高度每 2 公尺內應設置足夠強度之縱向、橫向水平繫條，以防止支柱之移動","上端支以梁或軌枕等貫材時，應使用牽引板將上端固定於貫材"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":true},{"id":138,"text":"依營造安全衛生設施標準規定，對於隧道、坑道開挖作業，其豎坑深度超過多少公尺者，應設專供人員緊急出坑之安全吊升設備？","options":["10","15","5","20"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":139,"text":"依營造安全衛生設施標準規定，從事露天開挖作業時，開挖出之土石應常清理，不得堆積於與開挖面高度等值之坡肩寬度範圍內以及何處？","options":["開挖面 45 度方向","開挖面側方","開挖面上方","開挖面下方"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":true},{"id":140,"text":"依營造安全衛生設施標準規定，對於同一作業場所使用之鋼管，因鋼管厚度、外徑及強度相異時，為防止選用鋼管之混淆，應採取使勞工易於識別之方式為何？","options":["顏色標示","公告規格","口頭告知","教育訓練"],"answer":1,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":141,"text":"依營造安全衛生設施標準規定，進行鋼構組配作業前，應擬定作業，使勞工遵循，下列何者不在該作業計畫法定範圍內？","options":["安全作業方法及標準作業程序","防止構材及其組配件飛落或倒塌之方法","設置能防止作業勞工發生墜落之設備及其設置方法","決定接合構件尺寸及指揮勞工作業"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":142,"text":"依營造安全衛生設施標準規定，對於沉箱、沉筒、井筒等之設備內部，從事開挖作業時，應測定空氣中氧氣之濃度及何項氣體之濃度？","options":["惰性氣體","氮氣","有害氣體","不活性氣體"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":143,"text":"依職業災害勞工保護法規定，勞工保險之保險人，在保險有效期間，罹患職業疾病，喪失部分或全部工作能力，經請領勞工保險各項職業災害給付後，得向勞工保險局請領生活津貼之補助，合計以幾年為限？","options":["5","3","7","2 112.05.16 版"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":144,"text":"依營造安全衛生設施標準規定，系統式施工架之金屬材料、管徑、厚度、表面處理、輪盤或八腳盤等構建之雙面全周焊接、製造方法及標示等，應符合下列何項國家標準？","options":["CNS 4750 鋼管施工架","CNS 7534 高處作業用安全帶","CNS 7535 高處作業用安全帶檢驗法","CNS 4751 鋼管施工架檢驗法"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":145,"text":"依營造安全衛生設施標準規定，有關下列護蓋之敘述，何者正確？ a.應具有能使用人員及車輛安全通過之強度。 b.應以有效方法防止滑溜、掉落、掀出或移動。 c.供車輛通行者，得以車輛後軸載重之 2 倍設計之，並不得妨礙車輛之正常通行。d.為柵狀構造者，柵條間隔不得大於 3 公分。e.上面不得放置機動設備或超過其設計強度之重物。 f.臨時性開口處使用之護蓋，表面漆以綠色，並書以警告訊息。","options":["a.b.c.d.f","b.c.d.e.f","a.b.d.e.f","a.b.c.d.e"],"answer":4,"law":"職業安全衛生法","isNumeric":true},{"id":146,"text":"依勞動檢查法規定，勞動檢查機構於受理勞工申訴後，應儘速就其申訴內容派勞動檢查員實施檢查，並於幾日內將檢查果通知申訴人？","options":["7","15","14","10"],"answer":3,"law":"勞動檢查法","isNumeric":false},{"id":147,"text":"依職業災害勞工保護法規定，政府應建立工殤紀念碑，訂每年幾月幾日為工殤日，推動勞工安全衛生教育？","options":["5 月 1 日","4 月 28 日","2 月 28 日","9 月 21 日"],"answer":2,"law":"職業安全衛生法","isNumeric":true},{"id":148,"text":"依職業安全衛生法規定，下列何者為受僱從事工作獲致工資者？","options":["勞工","雇主","事業單位","承攬人"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":149,"text":"職業安全衛生教育訓練規則，係依下列何種法規訂定？","options":["職業安全衛生法","工會法","勞動基準法","勞工保險條例"],"answer":1,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":150,"text":"下列何者雇用勞工之事業，不適用職業安全衛生法？","options":["水電燃氣業","環境衛生服務業","營造業","未支薪家族事業"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":151,"text":"依職業安全衛生設施規則規定，高差超過幾公尺以上之施工作業場所，需設置安全上下設備？","options":["1.5","2","3","2.5"],"answer":1,"law":"職業安全衛生設施規則","isNumeric":false},{"id":152,"text":"下列何者非組織衝突之起因？","options":["資源分配平均","執掌、權責等不明確","權力與利益遭受瓜分","溝通不良"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":153,"text":"下列何者因素不致造成組織的衝突？","options":["異議","共識","對立","難容"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":154,"text":"下列何者構成組織溝通協調之阻力？","options":["利益大於成本","事業訓練互異，缺乏共同語言","相似的資源、目標及需要","高階主管的支持與認同"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":155,"text":"下列何者為成員共享的安全價值，信念與規範，表徵於個人及組織的行動與態度、政策及程序等過程，強調成員共享的安全知覺？","options":["職業災害調查","職業災害防止計畫","自動檢查計畫","安全文化"],"answer":4,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":156,"text":"發生職業災害時，除必要之急救、搶救外，雇主非經哪個單位許可，不得移動或破壞現場？","options":["工程監造單位","勞動部","司法機關或勞動檢查機構","工程主辦機關"],"answer":3,"law":"勞動檢查法","isNumeric":false},{"id":157,"text":"職業災害原因分析時，將管理不良歸屬下列何者？","options":["直接原因","基本原因","不安全狀況","間接原因"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":158,"text":"某都會區捷運潛盾隧道工程進行開挖作業，下列敘述何者錯誤？","options":["經許可後可攜帶打火機進入隧道","未經許可禁止在隧道內進行電銲作業","經許可後可在隧道內進行熔接作業","汽油引擎以外之內燃機不得在隧道內使用"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":159,"text":"我國目前職業病必須由專家判定，下列何者非屬判定條件？","options":["曾經在有害因子的環境下工作","發病必須在接觸有害因子之後","工作場所中有害因子確實存在","起因與非職業原因有關 112.05.16 版"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":160,"text":"下列何者不屬於局限空間作業之危害防止計畫應訂定事項？","options":["氧氣、危險物、有害物濃度測定","作業工期及費用","人員進入作業許可程序","通風換氣實施方式"],"answer":2,"law":"職業安全衛生設施規則","isNumeric":false},{"id":161,"text":"為防止缺氧、中毒災害，於汙水管道連接井清理作業時應採取之措施，何者錯誤？","options":["作業人員佩戴背負式安全帶並使用捲揚式防墜器","作業前先開啟前後人孔，並設置通風設施","使用防塵口罩","作業前應測定連接井內有害氣體濃度"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":162,"text":"下列何者為爆材庫設置及管理之正確作為？","options":["爆炸物管理員應定期檢查、清點爆炸物","爆材庫應上鎖，並於夜間派員看守","領用爆炸物數量不需點收，多餘部分當日繳回即可","爆材庫之設置應依據營造安全衛生設施標準規定申請核准"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":163,"text":"下列何者非屬易發生火災之作業？","options":["電銲作業","施工架組配作業","油漆作業","模板作業"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":164,"text":"吊運鋼筋時，應予紮牢以防滑落；鋼筋長度超過幾公尺時，應在適當距離之二端以吊鍊鈎住或拉索捆紮拉緊，保持平穩以防擺動？","options":["3","5","2","4"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":165,"text":"營建工地各類物料之堆放或儲存，不可堆置於開口多少公尺以內？","options":["4","2","5","3"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":166,"text":"以移動式起重機吊運鋼筋作業，若鋼索斷裂，可能發生何種危害？","options":["物體飛落","被撞","倒塌","墜落"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":167,"text":"某鋼結構建築使用移動式起重機吊裝鋼構時，下列敘述何者錯誤？","options":["起重機作業時應指派專人負責指揮","鋼構長度超過 6 公尺時，應於一端以拉索捆紮拉緊，保持平穩防止擺動","安放鋼構時，應由側方或交叉方向完全支撐","施工範圍應管制非作業人員不得進入"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":true},{"id":168,"text":"隧道內有下列何種狀況時，使用之馬達用電設備、照明燈等應有防爆性能？","options":["可燃性氣體","湧水現象","崩塌","落磐"],"answer":1,"law":"職業安全衛生設施規則","isNumeric":false},{"id":169,"text":"11400 伏特的電壓屬於下列何者？","options":["高壓電","特高壓電","超高壓電","低壓電"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":170,"text":"拆除結構物之作業為防止感電，下列敘述何者正確？","options":["臨時配電於欲拆牆方面施工","切斷欲拆除牆面之電源並拆除設備及線路","保留欲拆除牆面之電源以供電力","拆除使用之破碎機，可使用原配置之電源"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":171,"text":"都會區捷運潛盾隧道工程，常需設置高壓變電站，下列敘述何者正確？","options":["高壓變電站設置之隔離設施頂部，為利通風不可設置護蓋","高壓變電站四週應設置隔離設施以利放置電纜等材料","高壓變電站隔離設施內應管制非工作人員不得進入","高壓變電站應由專業人員管理，故不須上鎖"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":172,"text":"使用具有外伸撐座之移動式起重機，其外伸撐座應如何使用？","options":["依起重大小外伸","依現場空間大小外伸","伸至最大極限位置","視伸臂長度決定外伸"],"answer":3,"law":"起重升降機具安全規則","isNumeric":false},{"id":173,"text":"下列何者屬於具有危險性之機械？","options":["鍋爐","壓力容器","高壓氣體特定設備及高壓氣體容器","符合中央主管機關所定吊升荷重一定重量以上之移動式起重機"],"answer":4,"law":"起重升降機具安全規則","isNumeric":false},{"id":174,"text":"都會區建築工程因施工用地有限，地下室開挖區經常設置施工構臺，下列敘述何者有誤？","options":["施工構臺支柱應依現場土質埋入適當深度","因施工構臺寬度有限，故於構臺上使用移動式起重機時，外伸撐座可不需全部伸展","施工構臺上堆置物料，避免集中並不得超過其荷重限制","構臺開口邊緣，應設置護欄或可確實鉤掛安全帶之設施"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":175,"text":"模板支撐支柱之基礎，應依土質狀況辦理事項，以下何者為非？","options":["鋪築足夠強度之混凝土層或覆工鈑","場撐基地積水未處理","整平並滾壓夯實","強化支柱下土壤承載力 112.05.16 版"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":176,"text":"高度 2 公尺以上開口護欄設置下列敘述何者為非？","options":["木材構成上欄桿及桿柱之斷面應在30 平方公分以上","鋼管構成桿柱不得超過 2.5 公尺，桿柱直徑不得小於 3.6 公分","上欄桿高度在 90 公分以上","桿柱強度及錨錠，應使整個護欄具有抵抗上欄桿任一點任何方向加以 75 公斤之荷重而不變型"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":true},{"id":177,"text":"框式施工架之拆除作業最合理之順序為何？ a.拆除工作臺(踏板) b.拆除上下設備 c.拆除交叉拉桿、下拉桿及端部護欄 d.拆除力架 e.拆除壁連坐或繫牆桿 f.拆除外側防護網、帆布 g.安裝拆除層安全母索等","options":["f-b-a-g-c-d-e","f-c-a-b-g-d-e","f-b-c-a- g-e-d","f-a-b-g-c-d-e"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":178,"text":"有關使用合梯作業，下列敘述何者錯誤？","options":["有安全防滑梯面","梯腳與地面夾角任何角度皆可，且兩梯腳間無需繫材扣牢","合梯材質不可有顯著損傷","合梯須有堅固知構造"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":179,"text":"某建築工程因地下室滲水，需施作地盤改良，正進行袋裝水泥進場作業，下列敘述何者正確？","options":["水泥堆置高度不得超過 12 層，6 層以上部分應向內退縮","水泥堆置高度不得超過 10 層，6 層以上部分應向內退縮","水泥堆置高度超過 10 層者，5 層以上部分應向內退縮","水泥堆置高度不得超過 10 層，5 層以上部分應向內退縮"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":180,"text":"施工架在適當之垂直、水平距離處構造物妥實連接，其間隔在垂直方向以不超過幾公尺為原則？","options":["10.5","12.5","5.5","11.5"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":181,"text":"下列何者不是施工架倒塌之原因？","options":["組成系統失敗","風壓引起","作業人員缺氧","支柱扭曲"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":182,"text":"某橋梁工程之橋墩需施作沉箱開挖作業，下列敘述何者正確？","options":["沉箱刃口至頂版之淨距應在 1.8 公尺以上","沉箱刃口下端不得下挖 0.8 公尺以上","沉箱刃口至頂版之淨距應在 2 公尺以上","沉箱刃口下端不得下挖 1 公尺以上"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":true},{"id":183,"text":"橋梁工程於橋墩施工時，有關作業人員上下設備，下列敘述何者錯誤？","options":["上下設備基礎應整平夯實，確認地面承載力","可使用簡易式移動架以保持機動","上下設備設置時，應與橋墩妥實固定與連結","上下設備應由專業人員妥為設計"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":184,"text":"露天開挖作業中常見災害為倒塌崩塌、墜落、感電及物體飛落，其相關防災作法，以下何者為非？","options":["開挖深度大於 1.5m 以上，有崩塌之虞，應設擋土支撐","挖土機迴轉半徑內，可允許工作人員自由進出","依地質鑽探調查結果擬定開挖計畫","開挖車輛機械應裝設倒車或旋轉警示燈及蜂鳴器"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":185,"text":"對於鋼筋混凝土做業中之鋼筋安全防護與作為，下列敘述何者錯誤？","options":["鋼筋不得散放於施工架上","吊掛鋼筋可單點吊掛","暴露之鋼筋將尖銳彎曲或加蓋","使搬運鋼筋作業勞工戴用手套"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":186,"text":"橋梁基礎採用沉箱時，其施工作業步驟順序，下列敘述何者正確？","options":["沉箱吊裝->箱體製作->箱內填築->土方開挖->加載下沉","沉箱腳安裝->箱體製作->土方開挖->加載下沉- >箱內填築","沉箱吊裝->土方開挖->箱體製作->加載下沉->箱內填築","沉箱吊裝->加載下沉->箱體製作->土方開挖->箱內填築"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":187,"text":"下列有關拆除作業之敘述，何者錯誤？","options":["使用重力錘時，應以撞擊點為中心，構造物高度 1.5 倍以上之距離為半徑設置作業區，除操作人員外，禁止無關人員進入","修繕作業，施工時需鑿開或鑽入構造物者，應以露天開挖或隧道作業規定辦理，不適用拆除構造物相關規定","使用施工架時，應注意其穩定，並不得緊靠被拆除之構造物","在鄰近通道之人員保護設施完成前，不得進行拆除工程 112.05.16 版"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":true},{"id":188,"text":"下列安全設施何者可使用於外牆拉皮作業防止人員墜落？","options":["移動式施工架、交叉拉桿、踏板、安全網","電動工作平台、背負式安全帶、安全網","移動式起重機、腰掛式安全帶","高空作業車"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":189,"text":"下列有關變更管理實施方式之敘述，何者錯誤？","options":["變更內容應通知施工人員並經啓用前檢查確認機具設備、設施等均已更設完成，方得施工","擬訂變更計畫後應實施風險評估","應評估變更後可能出現之風險，擬訂適當對策","應將變更後之施工圖、施工計畫等文件發交施工團隊簽收後立即施工"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":190,"text":"營造工程危害告之應如何實施？","options":["於交付承攬時，應以書面告知作業內容及工作場所可能存在之危害狀況","由承攬人於作業前實施危害調查後，將所發掘之危害內容，以書面告知原事業單位","於協議組織告知各相關承攬人現場安全設施之潛在危害","於工地巡視時由工地主任告知承攬人所承攬工作項目之潛在危害"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":191,"text":"下列何者為承攬人無法改善必須退場之時機？","options":["發生虛驚事故時","安全衛生缺失計點達罰款上限額度時","承攬人履約過程出現重大瑕疵，無法繼續履行契約時","分項工程作業計畫於危險性工作場所審查時未通過"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":192,"text":"下列有關工區整理整頓之敘述，何者錯誤？","options":["作業後應將工作場所清理乾淨，並將材料、工具歸位","各施工團隊應事先協議施工場地整理整頓之責任區劃分，於每日工作結束時，進行打掃、工具材料歸位等事宜","機具修復保養場所應經常清理地面油漬，以防滑倒","工區管理屬原事業單位之職責，整理整頓工作與承攬人無關"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":193,"text":"下列有關營造工程協議組織運作方式之敘述，何者正確？","options":["原事業單位得篩選參加協議組織之成員","起重吊掛作業應由原事業單位派員指揮，以統一作業方式、順序及安全防護設施，可不需納入協議組織管理","協議組織之運作由原事業單位事需要實施，無關乎工地運作","施工過程原事業單位應召集各承攬人及相關人員進行協議"],"answer":4,"law":"起重升降機具安全規則","isNumeric":false},{"id":194,"text":"某一工程需跨越山谷架設吊橋，下列事項何者正確？","options":["橋塔設置高度 5 公尺以上施工架，應由工地主任詳實計算、分析、設計，並經專任工程簽章確認","指派鋼構組配作業主管實施作業前危害調查","於設計階段應實施風險評估，以確認設計成果之安全性","職業安全衛生管理人員應全權負責施工規劃階段風險評估，並將評估結果落實於施工計畫等文件中"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":true},{"id":195,"text":"下列有關職業安全衛生管理系統之敘述，何者正確？","options":["承攬丁類危險性工作場所之工程，應實施施工安全評估後，建立職業安全衛生管理系統","職業安全衛生管理系統應包括:政策、組織設計、規劃與實施、評估、改善措施","職業安全衛生管理系統應包括: 規劃、實施、檢查、改正行動、管理代表","營造業從業人數超過 100 人以上者，應建立職業安全衛生管理系統"],"answer":2,"law":"職業安全衛生法","isNumeric":true},{"id":196,"text":"下列有關丁類危險性工作場所施工安全評估，應經執業技師簽章之敘述，何者錯誤？","options":["模板支撐計算書及施工圖之審查簽章可由結構技師辦理","地質調查報告知審核簽章可由大地技師辦理","施工架組配之工圖之審核簽章可由土木技師辦理","工業安全技師得辦理擋土支撐計算書及施工圖之審核簽章"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":197,"text":"運用風險矩陣方式評估者，風險可能性之評量方式，下列敘述何者正確？","options":["可能性低:0，有可能:2，極有可能:3","偶發性作業:3，持續性作業:2，搶修作業:1","經常性作業:3，緊急應變作業:2，維修作業:1","極有可能:3，有可能:2，可能性低:1 112.05.16 版"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":198,"text":"下列有關風險評估之敘述，何者正確？","options":["風險評估係指辨識、分析及評量風險之過程","風險評估為職業安全衛生管理系統認證單位稽核之工具","一律以機率及損失值估計風險規模，以具體量化風險評估","風險評估係指依據歷年職災實錄辨識出該工程主要危害類型之過程"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":199,"text":"下列何者為 ISO45001 所定義之管理階層職責？","options":["擬定職業安全衛生管理目標","辦理員工教育訓練","執行職業安全衛生稽核","督導系統運作並提供資源"],"answer":4,"law":"職業安全衛生教育訓練規則","isNumeric":false},{"id":200,"text":"下列何者為營造業建置職業安全衛生管理系統先期審查之目的？","options":["確認營造業現行職業安全衛生管理作為符合相關法令規定","確保建置營造業職業安全衛生管理系統所需支應之經費，控制在公司核定預算內","確認公司財務狀況","彙整分析相關法規、標準之規定，針對營造業經營管理特性，以制定職業安全衛生管理系統"],"answer":4,"law":"職業安全衛生法","isNumeric":false},{"id":201,"text":"下列有關營造業職業安全衛生管理系統稽核之敘述，何者錯誤？","options":["營造業者應訂定稽核程序，實施定期稽核，以確認安全衛生管理系統實施狀況","為確保稽核作業契合施工專業及現場實際作業狀況，應由第一線工程師專責辦理","營造業者應訂定稽核計畫，詳列稽核實施方式","稽核結果應呈送管理代表後，通知被稽核單位，並追蹤辦理情形"],"answer":2,"law":"職業安全衛生法","isNumeric":false},{"id":202,"text":"下列有關職業安全衛生政策之敘述，何者符合 CNS15506 之規定？","options":["事業單位訂定後應提報檢查機構核定","應由事業單位最高管理階層核定","應由職業安全衛生業務主管研擬，經管理審查會議核定","事業單位應依據職業安全衛生主管機關頒行之年度檢查目標訂定職業安全衛生政策"],"answer":2,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":203,"text":"下列何者為職業安全衛生管理系統指導綱要之訂定目的？","options":["主管機關提升職業安全衛生管理績效之政策綱領","公共工程主辦機關推動加強公共工程施工安全衛生之實施依據","說明職業安全衛生系統建置需求，以為事業單位建立及推動 TOSHMS 之參考","檢查機構審查事業單位提報職業安全衛生管理計畫之依據"],"answer":3,"law":"職業安全衛生管理辦法","isNumeric":false},{"id":204,"text":"我國營造業十大危險工作，罹災比例最高者為？","options":["屋頂工作人員","模板人員","營建工程清潔人員","焊接及切割人員"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":205,"text":"下列何者非職業災害須具備之要件？","options":["生理上的傷害","具有工作者身份","須在工作場所發生","職業上的原因"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":206,"text":"上包商參與工程競技標時，為壓低標價或便宜行事，往往將安全衛生經費的編列計算方式列計算方式？","options":["轉嫁下包商分攤","量化計量計價","一式計價","自行吸收"],"answer":3,"law":"職業安全衛生法","isNumeric":false},{"id":207,"text":"依災害類型分類說明表，因施工架或建築物等之崩塌、倒塌而碰撞人體之情況，屬下列何種災害類型？","options":["被撞","物體倒塌、崩塌","物體飛落","墜落"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":208,"text":"依營造安全衛生設施標準規定，施工架任一處步行至最近上下設備之距離，應在多少公尺以下？","options":["35","30","20","25"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":209,"text":"依營造安全衛生設施標準規定，框式鋼管式施工架之構築，最上層及每隔幾層應設置水平梁？","options":["3","5","6","4"],"answer":2,"law":"營造安全衛生設施標準","isNumeric":false},{"id":210,"text":"依營造安全衛生設施標準規定，對於橋梁工程之預力施作時機為何？","options":["混凝土達可施拉強度時","設置警告標示後","鋼鍵固定後","施拉預力之千斤頂確認正常後"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":211,"text":"依營造安全衛生設施標準規定，對模板支撐以梁支持時，於梁與梁間設置繫條之目的為何？","options":["防止滑落","防止偏心載重","防止橫向移動","防止脫落"],"answer":3,"law":"營造安全衛生設施標準","isNumeric":false},{"id":212,"text":"依營造安全衛生設施標準規定，鋼構組配作業應擬定作業計畫，並應於何時使勞工確實知悉作業計畫內容？","options":["勞工作業前","作業有事故之虞時","勞工有疑問時","勞工作業中 112.05.16 版"],"answer":1,"law":"職業安全衛生法","isNumeric":false},{"id":213,"text":"依營造安全衛生設施標準規定，拆除模板之時機，應依構造物之物質、形狀、混凝土強度及試驗結果、當地氣候情況及何處之工作情形，確認構造物已達安全強度之拆模時間後，始能為之？","options":["構造物側方","構造物下方","模板下方","構造物上方"],"answer":4,"law":"營造安全衛生設施標準","isNumeric":false},{"id":214,"text":"依營造安全衛生設施標準規定，為防止落磐、湧水等危害勞工，應事前實施地質調查；以鑽探、試坑、震測或其他適當方法，確定開挖區之地表形狀、地層、地質、岩層變動情形及斷層與含水砂土地帶之位置、地下水位之狀況等作成紀錄，並繪出詳圖，係針對下列何項作業？","options":["隧道、坑道開挖作業","露天開挖作業","模板支撐","鋼筋混凝土作業"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":215,"text":"依營造安全衛生設施標準規定，有關墜落災害防止事項之敘述中，下列採取之先後優先順序，何者為正確？a 張掛安全網 b 限制作業人員進入管制區 c 設置護欄、護蓋 b 經由設計或工法之選擇，儘量使勞工於地面完成作業，減少高處作業項目 e 設置警示線系統 f 經由施工程序之變更，優先施作永久構造物之上下設備或防墜設施 g 使勞工佩掛安全帶","options":["d.f.c.a.g.e.b","c.d.e.f.g.a.b","d.e.f.c.a.b.g","a.b.d.c.e.f.g"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":216,"text":"依職業安全衛生設施規則規定，在通風及換氣部分，雇主對於勞工經常作業之室內作業場所，其窗戶及其他開口部分等可直接與大氣相通之開口部分面積，應為地板面積多少比例以上？","options":["1:20","1:50","1:40","1:30"],"answer":1,"law":"營造安全衛生設施標準","isNumeric":false},{"id":217,"text":"依職業安全衛生設施規則規定，雇主對於從事灌注、卸收或儲藏危險物於槽車或槽體等作業，下列敘述何者錯誤？","options":["作業結束後，確認不致因引擎啟動而發生危害後，始得發動","使用軟管從事可燃性氣體之灌注時，應事先確定軟管結合部分以確實連接牢固","使用槽車從事灌注作業前，槽車之引擎不應熄火","使用槽車從事灌注作業前，應設置適當之輪擋"],"answer":3,"law":"職業安全衛生設施規則","isNumeric":false},{"id":218,"text":"依職業安全衛生法施行細則規定，下列何者非屬安全衛 const TOTAL = 402;

// ── Persistence keys ──────────────────────────────────────────────────────────
const WRONG_KEY    = 'osh_wrong_v1';
const ANSWERED_KEY = 'osh_answered_v1';
const THEME_KEY    = 'osh_theme';

// ── Load persisted state ──────────────────────────────────────────────────────
let wrongSet = new Set(JSON.parse(localStorage.getItem(WRONG_KEY) || '[]'));

// answered: Map<id, {chosen, correct}>
// Stored as plain object {id: chosen} in localStorage
const _savedAnswered = JSON.parse(localStorage.getItem(ANSWERED_KEY) || '{}');
const answered = new Map(
  Object.entries(_savedAnswered).map(([k, chosen]) => {
    const q = QUESTIONS.find(q => q.id === +k);
    return [+k, { chosen, correct: q ? q.answer : chosen }];
  })
);

// ── Persist helpers ───────────────────────────────────────────────────────────
function saveWrong() {
  localStorage.setItem(WRONG_KEY, JSON.stringify([...wrongSet]));
}
function saveAnswered() {
  const obj = {};
  answered.forEach((val, id) => { obj[id] = val.chosen; });
  localStorage.setItem(ANSWERED_KEY, JSON.stringify(obj));
}

// ── Progress bar ──────────────────────────────────────────────────────────────
function updateProgress() {
  const count = answered.size;
  const pct = TOTAL > 0 ? Math.round(count / TOTAL * 100) : 0;
  const done = pct === 100;

  document.getElementById('progress-label').textContent =
    `已作答 ${count} / ${TOTAL} 題`;
  const pctEl = document.getElementById('progress-pct');
  pctEl.textContent = done ? '🎉 全部完成！' : pct + '%';
  pctEl.className = 'progress-pct' + (done ? ' done' : '');

  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.className = 'progress-fill' + (done ? ' done' : '');

  document.getElementById('progress-track').setAttribute('aria-valuenow', count);
}

// ── Wrong-answer helpers ──────────────────────────────────────────────────────
function markWrong(id) {
  wrongSet.add(id);
  saveWrong();
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('was-wrong'); card.classList.remove('answered-ok'); }
}
function unmarkWrong(id) {
  wrongSet.delete(id);
  saveWrong();
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.remove('was-wrong'); card.classList.add('answered-ok'); }
}

// ── Current filter state ──────────────────────────────────────────────────────
let currentFilter = '全部';
let currentSearch = '';

// ── Law tag ───────────────────────────────────────────────────────────────────
function lawTag(law, isNumeric) {
  const short = law.length > 8 ? law.slice(0, 8) + '…' : law;
  const cls = isNumeric ? 'law-tag numeric' : 'law-tag';
  return `<span class="${cls}">${short}</span>`;
}

// ── Render one card ───────────────────────────────────────────────────────────
function renderCard(q) {
  const ans = answered.get(q.id);
  const wasWrong = wrongSet.has(q.id);
  const numBadge = q.isNumeric ? ' 🔢' : '';

  // Card border class
  let cardCls = 'card';
  if (ans) cardCls += ans.chosen === q.answer ? ' answered-ok' : ' was-wrong';
  else if (wasWrong) cardCls += ' was-wrong';

  const optBtns = q.options.map((opt, i) => {
    const num = i + 1;
    let cls = 'opt-btn';
    let disabled = '';
    if (ans) {
      disabled = 'disabled';
      if (num === q.answer) cls += ' correct';
      else if (num === ans.chosen) cls += ' wrong';
    }
    return `<button class="${cls}" ${disabled} data-id="${q.id}" data-num="${num}">(${num}) ${opt}</button>`;
  }).join('\n');

  let resultHtml = '';
  if (ans) {
    if (ans.chosen === q.answer) {
      resultHtml = `<div class="result-row ok show">✅ 答對了！<button class="retry-btn" data-id="${q.id}">重試</button></div>`;
    } else {
      resultHtml = `<div class="result-row bad show">❌ 答錯！正解是 (${q.answer}) ${q.options[q.answer - 1]}<button class="retry-btn" data-id="${q.id}">重試</button></div>`;
    }
  }

  return `<div class="${cardCls}" id="card-${q.id}">
  <div class="card-header">
    <span class="q-num">Q${q.id}${numBadge}</span>
    ${lawTag(q.law, q.isNumeric)}
  </div>
  <div class="q-text">${q.text}</div>
  <div class="options">${optBtns}</div>
  ${resultHtml}
</div>`;
}

// ── Filter logic ──────────────────────────────────────────────────────────────
function filteredQuestions() {
  let list = QUESTIONS;
  if (currentFilter === '錯題本') {
    list = list.filter(q => wrongSet.has(q.id));
  } else if (currentFilter === '金庫密碼') {
    list = list.filter(q => q.isNumeric);
  } else if (currentFilter !== '全部') {
    list = list.filter(q => q.law === currentFilter);
  }
  if (currentSearch) {
    const kw = currentSearch.trim().toLowerCase();
    list = list.filter(q =>
      q.text.toLowerCase().includes(kw) ||
      q.options.some(o => o.toLowerCase().includes(kw))
    );
  }
  return list;
}

function filteredBase() {
  if (currentFilter === '錯題本') return wrongSet.size;
  if (currentFilter === '金庫密碼') return QUESTIONS.filter(q => q.isNumeric).length;
  if (currentFilter === '全部') return TOTAL;
  return QUESTIONS.filter(q => q.law === currentFilter).length;
}

// ── Render grid ───────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('main-grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const clearBtn = document.getElementById('clear-wrong-btn');
  const list = filteredQuestions();

  grid.querySelectorAll('.card').forEach(c => c.remove());

  if (list.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    const frag = document.createDocumentFragment();
    list.forEach(q => {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderCard(q);
      frag.appendChild(tmp.firstElementChild);
    });
    grid.appendChild(frag);
  }

  stats.textContent = currentSearch
    ? `顯示 ${list.length} / ${filteredBase()} 題`
    : `共 ${list.length} 題`;

  clearBtn.style.display = currentFilter === '錯題本' && wrongSet.size > 0 ? 'block' : 'none';
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('main-grid').addEventListener('click', e => {
  // Option button
  const optBtn = e.target.closest('.opt-btn');
  if (optBtn && !optBtn.disabled) {
    const id = +optBtn.dataset.id;
    const chosen = +optBtn.dataset.num;
    const q = QUESTIONS.find(q => q.id === id);

    answered.set(id, { chosen, correct: q.answer });
    saveAnswered();
    updateProgress();

    if (chosen !== q.answer) markWrong(id);
    else unmarkWrong(id);

    const card = document.getElementById('card-' + id);
    const tmp = document.createElement('div');
    tmp.innerHTML = renderCard(q);
    card.replaceWith(tmp.firstElementChild);
    return;
  }

  // Retry button
  const retryBtn = e.target.closest('.retry-btn');
  if (retryBtn) {
    const id = +retryBtn.dataset.id;
    answered.delete(id);
    saveAnswered();
    updateProgress();

    const q = QUESTIONS.find(q => q.id === id);
    const card = document.getElementById('card-' + id);
    const tmp = document.createElement('div');
    tmp.innerHTML = renderCard(q);
    card.replaceWith(tmp.firstElementChild);
  }
});

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('law-select').addEventListener('change', e => {
  currentFilter = e.target.value;
  render();
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value;
    render();
  }, 220);
});

document.getElementById('clear-wrong-btn').addEventListener('click', () => {
  if (!confirm('確定清除所有錯題記錄？')) return;
  wrongSet.clear();
  saveWrong();
  document.querySelectorAll('.card.was-wrong').forEach(c => c.classList.remove('was-wrong'));
  render();
});

document.getElementById('reset-progress-btn').addEventListener('click', () => {
  if (!confirm('確定重置所有作答記錄？\n（進度與錯題本都會清空）')) return;
  answered.clear();
  wrongSet.clear();
  saveAnswered();
  saveWrong();
  updateProgress();
  render();
});

// ── Dark mode ─────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-btn');

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
}

const savedTheme = localStorage.getItem(THEME_KEY);
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
applyTheme(savedTheme ? savedTheme === 'dark' : prefersDark);

themeBtn.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
});

// ── Init ──────────────────────────────────────────────────────────────────────
updateProgress();
render();
</script>
</body>
</html>
